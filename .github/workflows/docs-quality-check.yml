name: 文档质量检查

on:
  push:
    branches: [ main, develop ]
    paths:
      - 'docs/**'
      - 'packages/**/*.py'
      - 'tools/scripts/check_docs_quality.py'
  pull_request:
    branches: [ main ]
    paths:
      - 'docs/**'
      - 'packages/**/*.py'
      - 'tools/scripts/check_docs_quality.py'

jobs:
  docs-quality-check:
    runs-on: ubuntu-latest
    
    steps:
    - name: 检出代码
      uses: actions/checkout@v4
      
    - name: 设置Python环境
      uses: actions/setup-python@v4
      with:
        python-version: '3.11'
        
    - name: 安装依赖
      run: |
        python -m pip install --upgrade pip
        pip install requests pandas ast pathlib
        
    - name: 运行文档质量检查
      run: |
        python tools/scripts/check_docs_quality.py --project-root .
        
    - name: 检查docstring覆盖率
      run: |
        # 设置最低覆盖率要求
        COVERAGE_THRESHOLD=80
        COVERAGE=$(python tools/scripts/check_docs_quality.py --project-root . | grep "Docstring覆盖率" | grep -o '[0-9.]*%' | grep -o '[0-9.]*')
        if (( $(echo "$COVERAGE < $COVERAGE_THRESHOLD" | bc -l) )); then
          echo "❌ Docstring覆盖率 $COVERAGE% 低于要求 $COVERAGE_THRESHOLD%"
          exit 1
        else
          echo "✅ Docstring覆盖率 $COVERAGE% 符合要求"
        fi
        
    - name: 检查文档链接有效性
      run: |
        # 检查是否有损坏的链接
        BROKEN_LINKS=$(python tools/scripts/check_docs_quality.py --project-root . | grep "损坏链接数" | grep -o '[0-9]*')
        if [ "$BROKEN_LINKS" -gt 0 ]; then
          echo "❌ 发现 $BROKEN_LINKS 个损坏链接"
          exit 1
        else
          echo "✅ 所有链接都有效"
        fi
        
    - name: 检查ADR文档完整性
      run: |
        # 检查ADR文档是否存在且格式正确
        if [ ! -f "docs/ADR.md" ]; then
          echo "❌ ADR.md 文件不存在"
          exit 1
        fi
        
        # 检查ADR数量
        ADR_COUNT=$(grep -c "## ADR-" docs/ADR.md || echo "0")
        if [ "$ADR_COUNT" -lt 3 ]; then
          echo "❌ ADR数量 $ADR_COUNT 少于要求 3"
          exit 1
        else
          echo "✅ ADR数量 $ADR_COUNT 符合要求"
        fi
        
    - name: 上传检查报告
      uses: actions/upload-artifact@v3
      if: always()
      with:
        name: docs-quality-report
        path: docs/文档质量检查报告.md
        
    - name: 评论PR
      if: github.event_name == 'pull_request'
      uses: actions/github-script@v6
      with:
        script: |
          const fs = require('fs');
          const report = fs.readFileSync('docs/文档质量检查报告.md', 'utf8');
          
          github.rest.issues.createComment({
            issue_number: context.issue.number,
            owner: context.repo.owner,
            repo: context.repo.repo,
            body: `## 📋 文档质量检查报告\n\n\`\`\`\n${report}\n\`\`\``
          });
