name: CI/CD Pipeline

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]

env:
  NODE_VERSION: '18'
  PNPM_VERSION: '8.15.0'

jobs:
  # 代码质量检查
  lint:
    name: Code Quality & Linting
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'pnpm'

      - name: Install pnpm
        uses: pnpm/action-setup@v2
        with:
          version: ${{ env.PNPM_VERSION }}

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run ESLint
        run: pnpm lint

      - name: Check TypeScript compilation
        run: pnpm build

      - name: Validate config
        run: |
          python3 -c "from config.settings import Settings; Settings(); print('✅ 配置验证成功')"

  # 单元测试
  test-unit:
    name: Unit Tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'pnpm'

      - name: Install pnpm
        uses: pnpm/action-setup@v2
        with:
          version: ${{ env.PNPM_VERSION }}

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run unit tests
        run: pnpm test:unit

      - name: Run Python unit tests with coverage gate
        run: |
          cd packages/backend-python
          python -m pytest --cov=src --cov-fail-under=85 --cov-branch --cov-report=term-missing --cov-report=xml
        env:
          DATABASE_URL: postgresql://postgres:testpass@localhost:5432/quant_navigator_test
          REDIS_URL: redis://localhost:6379
          NODE_ENV: test

      - name: Upload unit test results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: unit-test-results
          path: tools/tests/reports/

  # 集成测试
  test-integration:
    name: Integration Tests
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_PASSWORD: testpass
          POSTGRES_DB: quant_navigator_test
          POSTGRES_USER: postgres
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432

      redis:
        image: redis:6-alpine
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 6379:6379

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'pnpm'

      - name: Install pnpm
        uses: pnpm/action-setup@v2
        with:
          version: ${{ env.PNPM_VERSION }}

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Wait for services
        run: |
          sleep 10
          pg_isready -h localhost -p 5432 -U postgres
          redis-cli -h localhost -p 6379 ping

      - name: Run database migrations
        run: |
          cd libs/database/migrations
          for file in *.sql; do
            echo "Running migration: $file"
            psql -h localhost -p 5432 -U postgres -d quant_navigator_test -f "$file"
          done
        env:
          PGPASSWORD: testpass

      - name: Run Quality Assurance Suite
        run: |
          # 运行TypeScript集成测试
          pnpm test:integration
          # 运行Python测试和覆盖率门禁检查
          cd packages/backend-python && poetry run pytest --cov=src --cov-fail-under=85 --cov-branch --cov-report=term-missing --cov-report=xml
        env:
          DATABASE_URL: postgresql://postgres:testpass@localhost:5432/quant_navigator_test
          REDIS_URL: redis://localhost:6379
          NODE_ENV: test

      - name: Upload integration test results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: integration-test-results
          path: tools/tests/reports/

  # 端到端测试
  test-e2e:
    name: End-to-End Tests
    runs-on: ubuntu-latest
    needs: [lint, test-unit, test-integration]

    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_PASSWORD: testpass
          POSTGRES_DB: quant_navigator_test
          POSTGRES_USER: postgres
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432

      redis:
        image: redis:6-alpine
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 6379:6379

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'pnpm'

      - name: Install pnpm
        uses: pnpm/action-setup@v2
        with:
          version: ${{ env.PNPM_VERSION }}

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build application
        run: pnpm build

      - name: Start services
        run: |
          # Start Python backend
          cd packages/backend-python && python -m uvicorn src.main:app --host 0.0.0.0 --port 8000 &
          BACKEND_PID=$!

          # Start frontend
          cd ../../packages/frontend-main && npm start &
          FRONTEND_PID=$!

          # Wait for services to be ready
          sleep 30

          # Check if services are running
          curl -f http://localhost:8000/health || exit 1
          curl -f http://localhost:3000 || exit 1
        env:
          DATABASE_URL: postgresql://postgres:testpass@localhost:5432/quant_navigator_test
          REDIS_URL: redis://localhost:6379
          NODE_ENV: test

      - name: Run E2E tests
        run: pnpm test:e2e
        env:
          DATABASE_URL: postgresql://postgres:testpass@localhost:5432/quant_navigator_test
          REDIS_URL: redis://localhost:6379
          NODE_ENV: test

      - name: Upload E2E test results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: e2e-test-results
          path: tools/tests/reports/

  # 测试覆盖率
  coverage:
    name: Test Coverage
    runs-on: ubuntu-latest
    needs: [test-unit, test-integration]

    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_PASSWORD: testpass
          POSTGRES_DB: quant_navigator_test
          POSTGRES_USER: postgres
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432

      redis:
        image: redis:6-alpine
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 6379:6379

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'pnpm'

      - name: Install pnpm
        uses: pnpm/action-setup@v2
        with:
          version: ${{ env.PNPM_VERSION }}

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Wait for services
        run: |
          sleep 10
          pg_isready -h localhost -p 5432 -U postgres
          redis-cli -h localhost -p 6379 ping

      - name: Run database migrations
        run: |
          cd libs/database/migrations
          for file in *.sql; do
            echo "Running migration: $file"
            psql -h localhost -p 5432 -U postgres -d quant_navigator_test -f "$file"
          done
        env:
          PGPASSWORD: testpass

      - name: Run tests with coverage
        run: pnpm test:coverage
        env:
          DATABASE_URL: postgresql://postgres:testpass@localhost:5432/quant_navigator_test
          REDIS_URL: redis://localhost:6379
          NODE_ENV: test

      - name: Upload coverage reports
        uses: actions/upload-artifact@v4
        with:
          name: coverage-reports
          path: tools/tests/reports/coverage/

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v3
        with:
          file: ./tests/reports/coverage/lcov.info
          flags: unittests
          name: codecov-umbrella
          fail_ci_if_error: false


  # 架构符合性扫描
  architecture-scan:
    name: Architecture Conformance Scan
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'pnpm'

      - name: Install pnpm
        uses: pnpm/action-setup@v2
        with:
          version: ${{ env.PNPM_VERSION }}

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run Architecture Scan
        run: pnpm arch:scan

      - name: Generate Architecture Graph
        run: pnpm arch:scan:dot

      - name: Upload Architecture Graph
        uses: actions/upload-artifact@v4
        with:
          name: architecture-graph
          path: architecture-graph.svg

  # 安全扫描
  security:
    name: Security Scan
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'pnpm'

      - name: Install pnpm
        uses: pnpm/action-setup@v2
        with:
          version: ${{ env.PNPM_VERSION }}

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run security audit
        run: pnpm audit --audit-level moderate

      - name: Run Snyk security scan
        uses: snyk/actions/node@master
        env:
          SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}
        with:
          args: --severity-threshold=high

  # 性能测试
  performance:
    name: Performance Tests
    runs-on: ubuntu-latest
    needs: [test-unit, test-integration]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'

    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_PASSWORD: testpass
          POSTGRES_DB: quant_navigator_test
          POSTGRES_USER: postgres
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432

      redis:
        image: redis:6-alpine
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 6379:6379

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'pnpm'

      - name: Install pnpm
        uses: pnpm/action-setup@v2
        with:
          version: ${{ env.PNPM_VERSION }}

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build application
        run: pnpm build

      - name: Run performance tests
        run: pnpm test:performance
        env:
          DATABASE_URL: postgresql://postgres:testpass@localhost:5432/quant_navigator_test
          REDIS_URL: redis://localhost:6379
          NODE_ENV: test

      - name: Upload performance results
        uses: actions/upload-artifact@v4
        with:
          name: performance-results
          path: tools/tests/reports/performance/

  # 部署到测试环境
  deploy-staging:
    name: Deploy to Staging
    runs-on: ubuntu-latest
    needs: [lint, test-unit, test-integration, test-e2e, coverage, security]
    if: github.ref == 'refs/heads/develop' && github.event_name == 'push'

    environment:
      name: staging
      url: https://staging.quant-navigator.com

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'pnpm'

      - name: Install pnpm
        uses: pnpm/action-setup@v2
        with:
          version: ${{ env.PNPM_VERSION }}

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build application
        run: pnpm build

      - name: Deploy to staging
        run: |
          echo "Deploying to staging environment..."
          # 这里添加实际的部署脚本
          # 例如：docker build, kubectl apply, 等

  # 部署到生产环境
  deploy-production:
    name: Deploy to Production
    runs-on: ubuntu-latest
    needs: [lint, test-unit, test-integration, test-e2e, coverage, security, performance]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    environment:
      name: production
      url: https://quant-navigator.com

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'pnpm'

      - name: Install pnpm
        uses: pnpm/action-setup@v2
        with:
          version: ${{ env.PNPM_VERSION }}

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build application
        run: pnpm build

      - name: Deploy to production
        run: |
          echo "Deploying to production environment..."
          # 这里添加实际的部署脚本
          # 例如：docker build, kubectl apply, 等

  # E2E测试（非阻塞模式）
  test-e2e-real:
    name: E2E Tests (Real World)
    runs-on: ubuntu-latest
    continue-on-error: true  # 非阻塞模式：即使失败也不阻止其他任务
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'  # 只在主分支推送时运行

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest pytest-asyncio

      - name: Run E2E Tests (Real World)
        env:
          TUSHARE_TOKEN: ${{ secrets.TUSHARE_TOKEN }}
        run: |
          echo "🚀 运行真实世界E2E测试..."
          echo "注意：这些测试会调用真实的Tushare API"
          echo "如果失败，请人工判断是外部问题还是代码问题"
          python -m pytest packages/backend-python/tests/e2e/test_real_world_e2e.py -v -m e2e --tb=short || true

      - name: E2E Test Results
        if: always()
        run: |
          if [ $? -eq 0 ]; then
            echo "🎉 E2E测试通过！系统在真实环境中工作正常"
          else
            echo "⚠️  E2E测试失败，请人工判断失败原因"
            echo "   1. 网络连接问题？"
            echo "   2. Tushare API问题？"
            echo "   3. 我们的代码问题？"
            echo "   4. 数据格式变化？"
            echo ""
            echo "如果是外部问题：可以忽略此失败"
            echo "如果是代码问题：立即创建bug并修复"
          fi

  # 通知
  notify:
    name: Notify Results
    runs-on: ubuntu-latest
    needs: [lint, test-unit, test-integration, test-e2e, coverage, security, test-e2e-real]
    if: always()

    steps:
      - name: Notify success
        if: ${{ needs.lint.result == 'success' && needs.test-unit.result == 'success' && needs.test-integration.result == 'success' && needs.test-e2e.result == 'success' && needs.coverage.result == 'success' && needs.security.result == 'success' }}
        run: |
          echo "✅ All CI checks passed successfully!"
          # 这里可以添加通知逻辑，如发送邮件、Slack消息等

      - name: Notify failure
        if: ${{ needs.lint.result == 'failure' || needs.test-unit.result == 'failure' || needs.test-integration.result == 'failure' || needs.test-e2e.result == 'failure' || needs.coverage.result == 'failure' || needs.security.result == 'failure' }}
        run: |
          echo "❌ CI checks failed. Please check the logs."
          # 这里可以添加失败通知逻辑

      - name: E2E Test Status
        if: always()
        run: |
          if [ "${{ needs.test-e2e-real.result }}" == "success" ]; then
            echo "✅ E2E测试通过：系统在真实环境中工作正常"
          elif [ "${{ needs.test-e2e-real.result }}" == "failure" ]; then
            echo "⚠️  E2E测试失败：请人工判断失败原因"
          else
            echo "ℹ️  E2E测试未运行（仅在主分支推送时运行）"
          fi
