[tool:pytest]
testpaths = tests
python_files = test_*.py *_test.py
python_classes = Test*
python_functions = test_*
addopts = 
    --strict-markers
    --strict-config
    --cov=src
    --cov-report=term-missing
    --cov-report=html
    --cov-report=xml
    --asyncio-mode=auto
    -v
markers =
    unit: Unit tests
    integration: Integration tests
    api: API tests
    slow: Slow tests
    auth: Authentication tests
    database: Database tests