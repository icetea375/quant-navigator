[tool.poetry]
name = "quantitative-navigator-backend"
version = "13.1.0"
description = "量化导航仪后端服务 - Python全栈架构"
authors = ["AI Assistant <ai@example.com>"]
readme = "README.md"
packages = [{include = "src"}]

[tool.poetry.dependencies]
python = "^3.9"

# Web框架
fastapi = "^0.104.0"
uvicorn = {extras = ["standard"], version = "^0.24.0"}
pydantic = "^2.5.0"
pydantic-settings = "^2.1.0"

# 数据科学
pandas = "^2.1.0"
numpy = "^1.25.0"
lightgbm = "^4.1.0"
scikit-learn = "^1.3.0"

# 数据库
sqlalchemy = "^2.0.0"
alembic = "^1.13.0"
psycopg2-binary = "^2.9.0"
redis = "^5.0.0"

# AI & LLM
openai = "^1.0.0"
anthropic = "^0.7.0"
zhipuai = "^2.0.0"
dashscope = "^1.14.0"

# HTTP客户端
httpx = "^0.25.0"
requests = "^2.31.0"

# 数据获取
tushare = "^1.2.0"

# 因果推理
dowhy = "^0.8.0"

# CLI工具
typer = "^0.9.0"
click = "^8.1.0"

# 类型检查
mypy = "^1.7.0"
types-requests = "^2.31.0"

# 代码质量
black = "^23.0.0"
isort = "^5.12.0"
flake8 = "^6.0.0"

[tool.poetry.group.dev.dependencies]
# 测试框架
pytest = "^7.4.0"
pytest-cov = "^4.1.0"
pytest-asyncio = "^0.21.0"
pytest-mock = "^3.12.0"

# 测试工具
httpx = "^0.25.0"
factory-boy = "^3.3.0"

[build-system]
requires = ["poetry-core"]
build-backend = "poetry.core.masonry.api"

[tool.pytest.ini_options]
testpaths = ["tests"]
python_files = ["test_*.py", "*_test.py"]
python_classes = ["Test*"]
python_functions = ["test_*"]
addopts = [
    "--strict-markers",
    "--strict-config",
    "--cov=src",
    "--cov-report=term-missing",
    "--cov-report=html",
    "--cov-report=xml",
    "--asyncio-mode=auto"
]
markers = [
    "unit: Unit tests",
    "integration: Integration tests",
    "api: API tests",
    "slow: Slow tests"
]

[tool.black]
line-length = 88
target-version = ['py39']
include = '\.pyi?$'
extend-exclude = '''
/(
  # directories
  \.eggs
  | \.git
  | \.hg
  | \.mypy_cache
  | \.tox
  | \.venv
  | build
  | dist
)/
'''

[tool.isort]
profile = "black"
multi_line_output = 3
line_length = 88
known_first_party = ["src"]

[tool.mypy]
python_version = "3.9"
warn_return_any = true
warn_unused_configs = true
disallow_untyped_defs = true
disallow_incomplete_defs = true
check_untyped_defs = true
disallow_untyped_decorators = true
no_implicit_optional = true
warn_redundant_casts = true
warn_unused_ignores = true
warn_no_return = true
warn_unreachable = true
strict_equality = true

[[tool.mypy.overrides]]
module = [
    "lightgbm.*",
    "tushare.*",
    "dowhy.*"
]
ignore_missing_imports = true
