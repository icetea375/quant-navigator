[tool.poetry]
name = "quant-navigator-backend"
version = "1.0.0"
description = "量化导航仪后端服务 - TDD最终版"
authors = ["Quant Navigator Team <dev@quant-navigator.com>"]
readme = "README.md"
packages = [{include = "src"}]

[tool.poetry.dependencies]
python = "^3.9"
# 核心依赖 - 解决版本冲突
pandas = "^2.0.0"  # 升级到2.0以解决兼容性
numpy = "^1.24.0"
sqlalchemy = "^2.0.0"
pydantic = "^2.0.0"
# HTTP请求
requests = "^2.28.0"
# 数据库连接
psycopg2-binary = "^2.9.0"
# 数据获取
tushare = "^1.2.0"
# Web框架
fastapi = "^0.100.0"
uvicorn = "^0.23.0"
# 机器学习 - 使用兼容版本
scikit-learn = "^1.3.0"
lightgbm = "^4.0.0"
# LLM API调用
openai = "^1.0.0"
anthropic = "^0.7.0"

[tool.poetry.group.dev.dependencies]
# 测试框架
pytest = "^8.4.2"
pytest-cov = "^7.0.0"
pytest-asyncio = "^1.2.0"
# 极简主义：一个工具解决所有静态分析问题
ruff = "^0.1.0"

[build-system]
requires = ["poetry-core"]
build-backend = "poetry.core.masonry.api"

[tool.poetry.scripts]
test = "pytest"
test-cov = "pytest --cov=src"
# 极简主义：一个命令解决所有代码质量问题
lint = "ruff check ."
format = "ruff format ."
check = "ruff check ."

# Ruff配置已移至ruff.toml文件
# 详见docs/LINTING_PHILOSOPHY.md中的判例法

[tool.pytest.ini_options]
testpaths = ["tests"]
python_files = ["test_*.py", "*_test.py"]
python_classes = ["Test*"]
python_functions = ["test_*"]
addopts = [
    "--strict-markers",
    "--strict-config",
    "--verbose",
    "--tb=short",
    "--cov=src",
    "--cov-report=term-missing",
    "--cov-report=html",
    "--cov-fail-under=85"
]
markers = [
    "slow: marks tests as slow (deselect with '-m \"not slow\"')",
    "integration: marks tests as integration tests",
    "unit: marks tests as unit tests",
    "e2e: marks tests as end-to-end tests"
]

# 质量门禁配置 - 唯一事实来源
[tool.coverage.run]
source = ["src"]

[tool.coverage.report]
# 总体覆盖率门禁
fail_under = 85
show_missing = true

# 注意：pytest-cov不支持按文件设置独立门禁
# 我们使用总体门禁，关键模块的覆盖率通过CI报告监控
